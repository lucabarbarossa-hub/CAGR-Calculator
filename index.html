<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CAGR Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Make slider thumb more prominent */
        input[type=range]::-webkit-slider-thumb {
            height: 20px; width: 20px; background: #2563eb; cursor: pointer; border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-2xl p-10 rounded-3xl shadow-2xl border border-slate-100">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Growth Projection</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-8">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Initial Capital (€)</label>
                    <input type="number" id="initial" value="10000" class="w-full text-xl font-semibold p-4 bg-slate-100 border-2 border-slate-200 rounded-2xl focus:border-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Monthly Add (€)</label>
                    <input type="number" id="monthly" value="200" class="w-full text-xl font-semibold p-4 bg-slate-100 border-2 border-slate-200 rounded-2xl focus:border-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Investment Years</label>
                    <input type="number" id="years" value="10" class="w-full text-xl font-semibold p-4 bg-slate-100 border-2 border-slate-200 rounded-2xl focus:border-blue-600 outline-none transition">
                </div>
                <div>
                    <div class="flex justify-between mb-3">
                        <label class="text-sm font-bold text-slate-700">Annual Return</label>
                        <span id="rateVal" class="text-blue-700 font-extrabold text-lg">7%</span>
                    </div>
                    <input type="range" id="rate" min="0" max="20" step="0.5" value="7" class="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <div class="bg-slate-900 rounded-3xl p-8 text-white flex flex-col justify-center">
                <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Total Projected Value</p>
                <h2 id="totalResult" class="text-5xl font-extrabold mt-2 mb-8">0€</h2>
                <div class="border-t border-slate-700 pt-6">
                    <p class="text-slate-400 text-sm font-bold uppercase">Pure Interest Earned</p>
                    <p id="interestResult" class="text-3xl font-bold mt-1 text-blue-400">0€</p>
                </div>
            </div>
        </div>

        <div class="mt-12 h-72 w-full">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script>
        const inputs = ['initial', 'monthly', 'years', 'rate'];
        let myChart = null;

        function calculate() {
            const P = parseFloat(document.getElementById('initial').value) || 0;
            const PMT = parseFloat(document.getElementById('monthly').value) || 0;
            const t = parseInt(document.getElementById('years').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) / 100) / 12;
            document.getElementById('rateVal').innerText = document.getElementById('rate').value + '%';

            let balance = P;
            let totalInvested = P;
            const labels = Array.from({length: t + 1}, (_, i) => i);
            const data = [P];

            for (let year = 1; year <= t; year++) {
                for (let month = 1; month <= 12; month++) {
                    balance = balance * (1 + r) + PMT;
                    totalInvested += PMT;
                }
                data.push(Math.round(balance));
            }

            document.getElementById('totalResult').innerText = Math.round(balance).toLocaleString() + '€';
            document.getElementById('interestResult').innerText = Math.round(balance - totalInvested).toLocaleString() + '€';
            updateChart(labels, data);
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.15)',
                        borderWidth: 5,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }, 
                        y: { grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold' } } } 
                    }
                }
            });
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
