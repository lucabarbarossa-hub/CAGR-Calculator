<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Calculator</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Container for fluid text */
        .result-container {
            container-type: inline-size;
            container-name: result-box;
        }

        /* The text shrinks automatically based on the container width */
        .fluid-text {
            font-size: 10cqw; 
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #2563eb;
        }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-8">

    <div class="w-full max-w-4xl">
        <header class="mb-16">
            <h1 class="text-5xl font-black text-slate-900 tracking-tighter">Growth.</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="md:col-span-1 space-y-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Initial Capital</label>
                    <input type="number" id="initial" value="10000" class="w-full text-2xl font-bold py-2 border-b-2 border-slate-200 focus:border-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Monthly Add</label>
                    <input type="number" id="monthly" value="200" class="w-full text-2xl font-bold py-2 border-b-2 border-slate-200 focus:border-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Years</label>
                    <input type="number" id="years" value="10" class="w-full text-2xl font-bold py-2 border-b-2 border-slate-200 focus:border-blue-600 outline-none transition">
                </div>
                <div class="pt-4">
                    <div class="flex justify-between mb-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Rate</label>
                        <span id="rateVal" class="text-blue-600 font-black text-lg">7%</span>
                    </div>
                    <input type="range" id="rate" min="0" max="20" step="0.5" value="7" class="w-full h-1 bg-slate-200 appearance-none cursor-pointer">
                </div>
            </div>

            <div class="md:col-span-2 space-y-12">
                <div class="bg-blue-600 text-white p-10 rounded-[2rem] result-container">
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-70">Total Value</p>
                    <h2 id="totalResult" class="fluid-text font-black tracking-tight mb-6">0€</h2>
                    <div class="flex gap-8 border-t border-blue-500 pt-6">
                        <div>
                            <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-70">Pure Interest</p>
                            <p id="interestResult" class="text-2xl font-bold">0€</p>
                        </div>
                    </div>
                </div>

                <div class="h-64 w-full">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['initial', 'monthly', 'years', 'rate'];
        let myChart = null;

        function calculate() {
            const P = parseFloat(document.getElementById('initial').value) || 0;
            const PMT = parseFloat(document.getElementById('monthly').value) || 0;
            const t = parseInt(document.getElementById('years').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) / 100) / 12;
            document.getElementById('rateVal').innerText = document.getElementById('rate').value + '%';

            let balance = P;
            let totalInvested = P;
            const labels = Array.from({length: t + 1}, (_, i) => i);
            const data = [P];

            for (let year = 1; year <= t; year++) {
                for (let month = 1; month <= 12; month++) {
                    balance = balance * (1 + r) + PMT;
                    totalInvested += PMT;
                }
                data.push(Math.round(balance));
            }

            document.getElementById('totalResult').innerText = Math.round(balance).toLocaleString() + '€';
            document.getElementById('interestResult').innerText = Math.round(balance - totalInvested).toLocaleString() + '€';
            updateChart(labels, data);
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#2563eb',
                        borderWidth: 4,
                        fill: false,
                        tension: 0.2,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, border: { dash: [5, 5] } }, 
                        y: { grid: { color: '#f8fafc' }, border: { display: false } } 
                    }
                }
            });
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
