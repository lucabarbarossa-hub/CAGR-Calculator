<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CAGR Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-3xl p-12 rounded-3xl shadow-2xl border border-slate-200">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Investment Growth Projection</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-900 mb-2">Initial Capital (€)</label>
                    <input type="number" id="initial" value="10000" class="w-full text-xl font-bold p-5 bg-white border-4 border-slate-200 rounded-2xl focus:border-blue-600 outline-none transition shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-900 mb-2">Monthly Add (€)</label>
                    <input type="number" id="monthly" value="200" class="w-full text-xl font-bold p-5 bg-white border-4 border-slate-200 rounded-2xl focus:border-blue-600 outline-none transition shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-900 mb-2">Investment Years</label>
                    <input type="number" id="years" value="10" class="w-full text-xl font-bold p-5 bg-white border-4 border-slate-200 rounded-2xl focus:border-blue-600 outline-none transition shadow-sm">
                </div>
                <div>
                    <div class="flex justify-between mb-3">
                        <label class="text-sm font-bold text-slate-900">Annual Return Rate</label>
                        <span id="rateVal" class="text-blue-700 font-extrabold text-lg">7%</span>
                    </div>
                    <input type="range" id="rate" min="0" max="20" step="0.5" value="7" class="w-full h-4 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-700">
                </div>
            </div>

            <div class="bg-blue-700 rounded-3xl p-10 text-white flex flex-col justify-center shadow-xl">
                <p class="text-blue-100 text-md font-bold uppercase tracking-widest">Total Projected Value</p>
                <h2 id="totalResult" class="text-6xl font-extrabold mt-3 mb-10">0€</h2>
                <div class="border-t border-blue-500 pt-8">
                    <p class="text-blue-200 text-sm font-bold uppercase">Pure Interest Earned</p>
                    <p id="interestResult" class="text-4xl font-bold mt-2">0€</p>
                </div>
            </div>
        </div>

        <div class="mt-12 h-80 w-full">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script>
        const inputs = ['initial', 'monthly', 'years', 'rate'];
        let myChart = null;

        function calculate() {
            const P = parseFloat(document.getElementById('initial').value) || 0;
            const PMT = parseFloat(document.getElementById('monthly').value) || 0;
            const t = parseInt(document.getElementById('years').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) / 100) / 12;
            document.getElementById('rateVal').innerText = document.getElementById('rate').value + '%';

            let balance = P;
            let totalInvested = P;
            const labels = Array.from({length: t + 1}, (_, i) => i);
            const data = [P];

            for (let year = 1; year <= t; year++) {
                for (let month = 1; month <= 12; month++) {
                    balance = balance * (1 + r) + PMT;
                    totalInvested += PMT;
                }
                data.push(Math.round(balance));
            }

            document.getElementById('totalResult').innerText = Math.round(balance).toLocaleString() + '€';
            document.getElementById('interestResult').innerText = Math.round(balance - totalInvested).toLocaleString() + '€';
            updateChart(labels, data);
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#1d4ed8',
                        backgroundColor: 'rgba(29, 78, 216, 0.1)',
                        borderWidth: 6,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 14 } } }, 
                        y: { grid: { color: '#e2e8f0' }, ticks: { font: { weight: 'bold', size: 14 } } } 
                    }
                }
            });
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
