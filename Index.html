<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CAGR Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white/95 backdrop-blur-lg w-full max-w-2xl p-10 rounded-3xl shadow-2xl border border-white/20">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Growth Projection</h1>
            <p class="text-slate-500">Calculate your wealth accumulation over time.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Initial Capital (€)</label>
                    <input type="number" id="initial" value="10000" class="w-full text-lg font-medium p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Monthly Add (€)</label>
                    <input type="number" id="monthly" value="200" class="w-full text-lg font-medium p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Investment Years</label>
                    <input type="number" id="years" value="10" class="w-full text-lg font-medium p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition">
                </div>
                <div>
                    <label class="flex justify-between mb-2">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Annual Return</span>
                        <span id="rateVal" class="text-blue-600 font-bold">7%</span>
                    </label>
                    <input type="range" id="rate" min="0" max="20" step="0.5" value="7" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>

            <div class="bg-blue-600 rounded-2xl p-6 text-white flex flex-col justify-between">
                <div>
                    <p class="text-blue-100 text-sm font-medium opacity-80">Total Value</p>
                    <h2 id="totalResult" class="text-4xl font-bold mt-1">0€</h2>
                </div>
                <div class="mt-6 pt-6 border-t border-blue-500/50">
                    <p class="text-blue-100 text-sm">Pure Interest</p>
                    <p id="interestResult" class="text-2xl font-semibold">0€</p>
                </div>
            </div>
        </div>

        <div class="mt-10 h-64 w-full">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script>
        const inputs = ['initial', 'monthly', 'years', 'rate'];
        let myChart = null;

        function calculate() {
            const P = parseFloat(document.getElementById('initial').value) || 0;
            const PMT = parseFloat(document.getElementById('monthly').value) || 0;
            const t = parseInt(document.getElementById('years').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) / 100) / 12;
            document.getElementById('rateVal').innerText = document.getElementById('rate').value + '%';

            let balance = P;
            let contributions = P;
            const labels = Array.from({length: t + 1}, (_, i) => i);
            const data = [P];

            for (let year = 1; year <= t; year++) {
                for (let month = 1; month <= 12; month++) {
                    balance = balance * (1 + r) + PMT;
                    contributions += PMT;
                }
                data.push(Math.round(balance));
            }

            document.getElementById('totalResult').innerText = Math.round(balance).toLocaleString() + '€';
            document.getElementById('interestResult').innerText = Math.round(balance - contributions).toLocaleString() + '€';
            
            updateChart(labels, data);
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            if (myChart !== null) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }, 
                        y: { grid: { color: '#e2e8f0' }, ticks: { color: '#64748b' } } 
                    }
                }
            });
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
